<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LED图纸解析器 - 多图纸支持 | API下载 | 移动端适配</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            font-family: -apple-system, 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: #e0e0e0;
            touch-action: pan-x pan-y;
        }

        .app-container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* 侧边栏 */
        .sidebar {
            width: 320px;
            background: #0a0c12;
            border-right: 1px solid #22262f;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            z-index: 20;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
                box-shadow: 2px 0 10px rgba(0,0,0,0.5);
                z-index: 100;
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }

        .menu-toggle {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 101;
            background: #1f2a44;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 99;
        }
        .overlay.show {
            display: block;
        }

        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #6c7a9e;
            padding: 0 16px 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn, .sub-toggle-btn {
            background: #1f2a44;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.65rem;
            cursor: pointer;
            color: #e0e0e0;
        }

        /* API下载区域 */
        .api-section {
            border-bottom: 1px solid #1e222c;
            padding: 12px 0;
        }

        .api-input-group {
            display: flex;
            gap: 8px;
            padding: 0 12px;
            margin-top: 8px;
        }

        .api-input {
            flex: 1;
            background: #11141e;
            border: 1px solid #252b3a;
            border-radius: 12px;
            padding: 10px 12px;
            color: white;
            font-size: 0.8rem;
            font-family: monospace;
        }

        .api-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .api-btn {
            background: #2c3e66;
            border: 1px solid #3b82f6;
            border-radius: 12px;
            padding: 8px 16px;
            color: white;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .api-btn:active {
            transform: scale(0.98);
        }

        .xml-list, .drawings-sub-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 12px;
            max-height: 180px;
            overflow-y: auto;
        }

        .xml-item, .sub-drawing-item {
            background: #11141e;
            border: 1px solid #252b3a;
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            color: #cfdef5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .xml-item.active, .sub-drawing-item.active {
            background: #1e2a3e;
            border-left: 3px solid #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .badge {
            font-size: 0.6rem;
            background: #2d3348;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .groups-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 12px 0;
        }

        .groups-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 12px;
        }

        .group-tag {
            background: #12161f;
            border-radius: 20px;
            padding: 8px 12px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #252c3c;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .group-tag.active-group {
            background: #1e3a5f;
            border-color: #3b82f6;
            color: white;
        }

        .group-name {
            font-family: monospace;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .group-count {
            font-size: 0.65rem;
            background: #1e2538;
            padding: 2px 6px;
            border-radius: 20px;
        }

        .action-buttons {
            margin: 12px;
            display: flex;
            gap: 8px;
            flex-direction: column;
        }

        .action-btn {
            background: #1f2538;
            border: none;
            border-radius: 40px;
            padding: 10px;
            color: #eef3ff;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
        }

        .action-btn.primary {
            background: #2c3e66;
            border: 1px solid #3b82f6;
        }

        .main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000000;
            overflow: hidden;
        }

        .toolbar {
            background: #080b10e0;
            backdrop-filter: blur(8px);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid #1e232e;
        }

        .pixel-size-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0f131c;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .size-control-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .size-btn {
            background: #2a2f41;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }

        input#pixelSizeSlider {
            width: 140px;
            cursor: pointer;
        }

        .pixel-size-value {
            min-width: 70px;
            font-family: monospace;
            font-size: 0.7rem;
            background: #00000066;
            padding: 2px 8px;
            border-radius: 20px;
            text-align: center;
        }

        .current-info {
            font-size: 0.7rem;
            background: #11161f;
            padding: 4px 12px;
            border-radius: 40px;
            font-family: monospace;
            flex: 1;
            text-align: right;
        }

        .canvas-container {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
        }

        canvas {
            display: block;
            box-shadow: 0 0 0 1px #2a2f3e;
            background-color: #000000;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .empty-state {
            color: #6c7a9e;
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #3b82f6;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0e16;
        }
        ::-webkit-scrollbar-thumb {
            background: #2c334b;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="overlay" id="overlay"></div>
    
    <div class="app-container">
        <div class="sidebar" id="sidebar">
            <!-- API下载区域 -->
            <div class="api-section">
                <div class="section-title">
                    <span>🌐 从API下载图纸</span>
                </div>
                <div class="api-input-group">
                    <input type="text" id="drawingIdInput" class="api-input" placeholder="输入图纸编号 (如: 491270)" />
                    <button class="api-btn" id="downloadDrawingBtn">下载</button>
                </div>
                <div class="api-input-group">
                    <input type="text" id="apiKeyInput" class="api-input" placeholder="API Key (可选)" style="font-size:0.7rem" />
                </div>
            </div>

            <!-- 仓库XML文件列表 -->
            <div style="border-bottom: 1px solid #1e222c; padding: 12px 0;">
                <div class="section-title">
                    <span>📁 仓库中的XML</span>
                    <button class="refresh-btn" id="refreshRepoBtn">刷新</button>
                </div>
                <div class="xml-list" id="xmlList">
                    <div class="empty-state">点击刷新加载XML文件</div>
                </div>
            </div>

            <!-- 当前XML下的图纸列表 -->
            <div style="border-bottom: 1px solid #1e222c; padding: 12px 0;">
                <div class="section-title">
                    <span>📄 图纸列表</span>
                    <span id="drawingCountBadge" style="font-size:0.6rem; background:#1f2a44; padding:2px 8px; border-radius:20px;">0个</span>
                </div>
                <div class="drawings-sub-list" id="subDrawingsList">
                    <div class="empty-state">请先选择XML文件</div>
                </div>
            </div>

            <div class="groups-section">
                <div class="section-title">🎨 颜色分组 (点击亮白)</div>
                <div class="groups-list" id="groupsList">
                    <div class="empty-state">请先选择图纸</div>
                </div>
                <div class="action-buttons">
                    <button class="action-btn primary" id="lightAllGroupsBtn">✨ 点亮所有分组</button>
                    <button class="action-btn" id="resetGroupsBtn">⚫ 全部熄灭</button>
                </div>
            </div>
        </div>

        <div class="main-view">
            <div class="toolbar">
                <div class="pixel-size-control">
                    <span>🔲</span>
                    <div class="size-control-wrapper">
                        <button class="size-btn" id="decreaseSizeBtn">-</button>
                        <input type="range" id="pixelSizeSlider" min="4" max="32" step="0.1" value="12">
                        <button class="size-btn" id="increaseSizeBtn">+</button>
                    </div>
                    <span class="pixel-size-value" id="pixelSizeValue">12.0px</span>
                </div>
                <div class="current-info" id="statsInfo">📐 未加载</div>
            </div>
            <div class="canvas-container" id="canvasContainer">
                <canvas id="ledCanvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const GITHUB_USERNAME = '您的用户名';     // 修改为您的GitHub用户名
        const GITHUB_REPO = 'led-viewer';         // 修改为您的仓库名
        
        // API配置
        const API_BASE_URL = "https://oss.ohmybead.cn";
        
        // 全局变量
        let currentXmlFiles = [];
        let currentDrawingsList = [];
        let currentDrawingIndex = -1;
        let currentDrawing = null;
        let currentPixelGrid = null;
        let currentActiveGroup = null;
        let currentPixelSize = 12;
        
        let canvas = document.getElementById('ledCanvas');
        let ctx = canvas.getContext('2d');
        let pixelSizeSlider = document.getElementById('pixelSizeSlider');
        
        const ALL_GROUPS_MODE = 'ALL_GROUPS';
        
        // 移动端侧边栏控制
        let sidebarOpen = false;
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        
        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
            sidebarOpen = false;
        }
        
        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('show');
            sidebarOpen = true;
        }
        
        function toggleSidebar() {
            if (sidebarOpen) closeSidebar();
            else openSidebar();
        }
        
        if (menuToggle) menuToggle.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', closeSidebar);
        
        function coordKey(x, y) { return `${x},${y}`; }
        
        // ========== API下载功能 ==========
        async function downloadDrawingFromAPI() {
            const drawingIdInput = document.getElementById('drawingIdInput');
            const drawingId = drawingIdInput.value.trim();
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            
            if (!drawingId) {
                alert('请输入图纸编号');
                return;
            }
            
            // 显示加载状态
            const subListDiv = document.getElementById('subDrawingsList');
            subListDiv.innerHTML = '<div class="loading">⏳ 正在下载图纸...</div>';
            
            try {
                // 构建请求头
                const headers = {};
                if (apiKey) {
                    headers["apikey"] = apiKey;
                    headers["authorization"] = `Bearer ${apiKey}`;
                }
                
                // 尝试多个可能的路径
                const urls = [
                    `${API_BASE_URL}/projects/56411/${drawingId}/drawing.omb`,
                    `${API_BASE_URL}/drawings/${drawingId}`,
                    `${API_BASE_URL}/api/drawings/${drawingId}`
                ];
                
                let response = null;
                let successUrl = null;
                
                for (const url of urls) {
                    try {
                        const res = await fetch(url, { headers });
                        if (res.ok) {
                            response = res;
                            successUrl = url;
                            break;
                        }
                    } catch (e) {
                        continue;
                    }
                }
                
                if (!response || !response.ok) {
                    throw new Error(`下载失败: ${response?.status || '网络错误'}`);
                }
                
                const arrayBuffer = await response.arrayBuffer();
                const content = new TextDecoder('utf-8').decode(arrayBuffer);
                
                // 尝试解析为JSON
                let jsonData;
                try {
                    jsonData = JSON.parse(content);
                } catch (e) {
                    // 如果不是JSON，尝试从XML中提取
                    const drawings = parseDrawingsFromXml(content, `drawing_${drawingId}.xml`);
                    if (drawings.length > 0) {
                        loadDrawingsIntoList(drawings, `API图纸 ${drawingId}`);
                        return;
                    }
                    throw new Error('无法解析图纸数据');
                }
                
                // 如果是JSON格式，转换为标准格式
                const drawings = convertJsonToDrawings(jsonData, drawingId);
                if (drawings.length > 0) {
                    loadDrawingsIntoList(drawings, `API图纸 ${drawingId}`);
                } else {
                    throw new Error('图纸数据格式无效');
                }
                
            } catch (error) {
                console.error('下载失败:', error);
                subListDiv.innerHTML = `<div class="empty-state">❌ 下载失败: ${error.message}<br>请检查图纸编号和API Key</div>`;
                alert(`下载失败: ${error.message}`);
            }
        }
        
        // 转换JSON格式为图纸对象
        function convertJsonToDrawings(jsonData, sourceId) {
            const drawings = [];
            
            // 如果直接是图纸数据
            if (jsonData.pixData || jsonData.groups) {
                const groupsMap = new Map();
                const pixData = jsonData.pixData || jsonData.groups || {};
                const width = jsonData.width || jsonData.screenSize?.[0] || 52;
                const height = jsonData.height || jsonData.screenSize?.[1] || 52;
                
                for (const [groupName, coords] of Object.entries(pixData)) {
                    if (Array.isArray(coords)) {
                        const coordSet = new Set();
                        for (const coord of coords) {
                            if (Array.isArray(coord) && coord.length >= 2) {
                                const x = Number(coord[0]);
                                const y = Number(coord[1]);
                                if (!isNaN(x) && !isNaN(y)) {
                                    coordSet.add(coordKey(x, y));
                                }
                            }
                        }
                        if (coordSet.size > 0) {
                            groupsMap.set(groupName, coordSet);
                        }
                    }
                }
                
                drawings.push({
                    id: sourceId,
                    name: jsonData.name || `图纸_${sourceId}`,
                    groups: groupsMap,
                    width: width,
                    height: height
                });
            }
            // 如果是包含多个图纸的对象
            else if (typeof jsonData === 'object') {
                for (const [id, data] of Object.entries(jsonData)) {
                    if (data.pixData) {
                        const groupsMap = new Map();
                        const width = data.width || data.screenSize?.[0] || 52;
                        const height = data.height || data.screenSize?.[1] || 52;
                        
                        for (const [groupName, coords] of Object.entries(data.pixData)) {
                            if (Array.isArray(coords)) {
                                const coordSet = new Set();
                                for (const coord of coords) {
                                    if (Array.isArray(coord) && coord.length >= 2) {
                                        const x = Number(coord[0]);
                                        const y = Number(coord[1]);
                                        if (!isNaN(x) && !isNaN(y)) {
                                            coordSet.add(coordKey(x, y));
                                        }
                                    }
                                }
                                if (coordSet.size > 0) {
                                    groupsMap.set(groupName, coordSet);
                                }
                            }
                        }
                        
                        drawings.push({
                            id: id,
                            name: data.name || `图纸_${id}`,
                            groups: groupsMap,
                            width: width,
                            height: height
                        });
                    }
                }
            }
            
            return drawings;
        }
        
        // 将图纸加载到列表中
        function loadDrawingsIntoList(drawings, sourceName) {
            if (drawings.length === 0) {
                alert('未找到有效的图纸数据');
                return;
            }
            
            currentDrawingsList = drawings;
            document.getElementById('drawingCountBadge').innerText = `${drawings.length}个`;
            
            const subListDiv = document.getElementById('subDrawingsList');
            subListDiv.innerHTML = '';
            
            drawings.forEach((drawing, idx) => {
                const div = document.createElement('div');
                div.className = 'sub-drawing-item';
                div.innerHTML = `
                    <span class="drawing-name">🎨 ${drawing.name}</span>
                    <span class="badge">${drawing.groups.size}组</span>
                `;
                div.addEventListener('click', () => selectDrawing(idx, div));
                subListDiv.appendChild(div);
            });
            
            // 默认选择第一个
            if (drawings.length > 0) {
                selectDrawing(0, subListDiv.firstChild);
            }
            
            // 移动端关闭侧边栏
            if (window.innerWidth <= 768) closeSidebar();
        }
        
        // ========== 从GitHub获取XML文件 ==========
        async function fetchXmlFileList() {
            const xmlListDiv = document.getElementById('xmlList');
            xmlListDiv.innerHTML = '<div class="empty-state">⏳ 加载中...</div>';
            
            try {
                const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/`;
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const files = await response.json();
                const xmlFiles = files.filter(file => file.name.endsWith('.xml') && file.type === 'file');
                currentXmlFiles = xmlFiles;
                
                if (xmlFiles.length === 0) {
                    xmlListDiv.innerHTML = '<div class="empty-state">📂 未找到XML文件<br>请上传XML到仓库根目录</div>';
                    return;
                }
                
                xmlListDiv.innerHTML = '';
                xmlFiles.forEach((file) => {
                    const div = document.createElement('div');
                    div.className = 'xml-item';
                    div.innerHTML = `<span class="drawing-name">📄 ${file.name}</span><span class="badge">${(file.size/1024).toFixed(0)}KB</span>`;
                    div.addEventListener('click', () => loadXmlAndDrawings(file.download_url, file.name, div));
                    xmlListDiv.appendChild(div);
                });
            } catch (error) {
                xmlListDiv.innerHTML = `<div class="empty-state">❌ 加载失败<br>请检查仓库配置</div>`;
                console.error(error);
            }
        }
        
        // 加载XML并提取所有图纸
        async function loadXmlAndDrawings(url, fileName, element) {
            document.querySelectorAll('.xml-item').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');
            
            const subListDiv = document.getElementById('subDrawingsList');
            subListDiv.innerHTML = '<div class="empty-state">⏳ 解析图纸中...</div>';
            
            try {
                const response = await fetch(url);
                const xmlText = await response.text();
                const drawings = parseDrawingsFromXml(xmlText, fileName);
                
                if (drawings.length === 0) {
                    subListDiv.innerHTML = '<div class="empty-state">❌ 未找到图纸数据</div>';
                    return;
                }
                
                currentDrawingsList = drawings;
                document.getElementById('drawingCountBadge').innerText = `${drawings.length}个`;
                
                subListDiv.innerHTML = '';
                drawings.forEach((drawing, idx) => {
                    const div = document.createElement('div');
                    div.className = 'sub-drawing-item';
                    div.innerHTML = `
                        <span class="drawing-name">🎨 ${drawing.name}</span>
                        <span class="badge">${drawing.groups.size}组</span>
                    `;
                    div.addEventListener('click', () => selectDrawing(idx, div));
                    subListDiv.appendChild(div);
                });
                
                if (drawings.length > 0) {
                    selectDrawing(0, subListDiv.firstChild);
                }
                
                if (window.innerWidth <= 768) closeSidebar();
                
            } catch (error) {
                subListDiv.innerHTML = `<div class="empty-state">❌ 加载失败: ${error.message}</div>`;
            }
        }
        
        // 解析XML
        function parseDrawingsFromXml(xmlText, fileName) {
            const regex = /<string name="flutter\.52_52_1_color_source_key_v1">(.*?)<\/string>/s;
            const match = xmlText.match(regex);
            if (!match || !match[1]) return [];
            
            let jsonStr = match[1];
            jsonStr = jsonStr.replace(/&quot;/g, '"').replace(/&apos;/g, "'").replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
            
            try {
                const sourcesObj = JSON.parse(jsonStr);
                const drawingsArray = [];
                for (const [id, sourceData] of Object.entries(sourcesObj)) {
                    if (!sourceData.pixData) continue;
                    const groupsMap = new Map();
                    const pixData = sourceData.pixData;
                    let width = 52, height = 52;
                    if (sourceData.screenSize && Array.isArray(sourceData.screenSize)) {
                        width = sourceData.screenSize[0] || 52;
                        height = sourceData.screenSize[1] || 52;
                    }
                    for (const [groupName, coordsArray] of Object.entries(pixData)) {
                        if (!Array.isArray(coordsArray)) continue;
                        const coordSet = new Set();
                        for (const coord of coordsArray) {
                            if (Array.isArray(coord) && coord.length >= 2) {
                                let x = Number(coord[0]), y = Number(coord[1]);
                                if (!isNaN(x) && !isNaN(y) && x >= 0 && y >= 0 && x < width && y < height) {
                                    coordSet.add(coordKey(x, y));
                                }
                            }
                        }
                        if (coordSet.size > 0) groupsMap.set(groupName, coordSet);
                    }
                    let drawingName = sourceData.name && sourceData.name.trim() !== "" ? sourceData.name : `图纸_${id.slice(-8)}`;
                    drawingsArray.push({
                        id: id,
                        name: drawingName,
                        groups: groupsMap,
                        width: width,
                        height: height
                    });
                }
                return drawingsArray;
            } catch(e) {
                console.error(e);
                return [];
            }
        }
        
        // 选择图纸
        function selectDrawing(index, element) {
            document.querySelectorAll('.sub-drawing-item').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');
            
            currentDrawingIndex = index;
            currentDrawing = currentDrawingsList[index];
            currentPixelGrid = buildPixelGroupsMap(currentDrawing);
            currentActiveGroup = null;
            
            updateGroupsSidebar();
            renderCanvas();
            
            document.getElementById('statsInfo').innerHTML = `${currentDrawing.name} | ${currentDrawing.width}x${currentDrawing.height} | ${currentDrawing.groups.size}组`;
        }
        
        // 构建像素网格
        function buildPixelGroupsMap(drawing) {
            if (!drawing) return null;
            const w = drawing.width, h = drawing.height;
            const pixelGroups = Array(h).fill().map(() => Array(w).fill().map(() => new Set()));
            for (const [groupName, coordSet] of drawing.groups.entries()) {
                for (const coordKeyStr of coordSet) {
                    const [x, y] = coordKeyStr.split(',').map(Number);
                    if (x >= 0 && x < w && y >= 0 && y < h) {
                        pixelGroups[y][x].add(groupName);
                    }
                }
            }
            return pixelGroups;
        }
        
        // 绘制网格线
        function drawGridLines(canvasWidth, canvasHeight, pixelSize, cols, rows) {
            if (!ctx) return;
            ctx.save();
            for (let i = 0; i <= cols; i++) {
                const x = i * pixelSize;
                const is10 = (i % 10 === 0);
                const is5 = (i % 5 === 0 && i % 10 !== 0);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvasHeight);
                if (is10) { ctx.lineWidth = 1.5; ctx.strokeStyle = '#a0a0a0'; }
                else if (is5) { ctx.lineWidth = 1.2; ctx.strokeStyle = '#606060'; }
                else { ctx.lineWidth = 0.8; ctx.strokeStyle = '#404040'; }
                ctx.stroke();
            }
            for (let i = 0; i <= rows; i++) {
                const y = i * pixelSize;
                const is10 = (i % 10 === 0);
                const is5 = (i % 5 === 0 && i % 10 !== 0);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvasWidth, y);
                if (is10) { ctx.lineWidth = 1.5; ctx.strokeStyle = '#a0a0a0'; }
                else if (is5) { ctx.lineWidth = 1.2; ctx.strokeStyle = '#606060'; }
                else { ctx.lineWidth = 0.8; ctx.strokeStyle = '#404040'; }
                ctx.stroke();
            }
            ctx.restore();
        }
        
        // 渲染画布
        function renderCanvas() {
            if (!currentPixelGrid || !ctx || !currentDrawing) return;
            const cols = currentDrawing.width, rows = currentDrawing.height;
            const pixelSize = currentPixelSize;
            const canvasWidth = cols * pixelSize;
            const canvasHeight = rows * pixelSize;
            
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            canvas.style.width = `${canvasWidth}px`;
            canvas.style.height = `${canvasHeight}px`;
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const groups = currentPixelGrid[row][col];
                    let lit = false;
                    if (currentActiveGroup === ALL_GROUPS_MODE) lit = groups.size > 0;
                    else if (currentActiveGroup !== null) lit = groups.has(currentActiveGroup);
                    if (lit) {
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillRect(col * pixelSize, row * pixelSize, pixelSize, pixelSize);
                    }
                }
            }
            drawGridLines(canvasWidth, canvasHeight, pixelSize, cols, rows);
            
            let total = cols * rows, litCount = 0;
            if (currentActiveGroup === ALL_GROUPS_MODE) {
                for (let r = 0; r < rows; r++)
                    for (let c = 0; c < cols; c++)
                        if (currentPixelGrid[r][c].size > 0) litCount++;
                document.getElementById('statsInfo').innerHTML = `✨ 全部点亮 | ${litCount}/${total}`;
            } else if (currentActiveGroup) {
                litCount = currentDrawing.groups.get(currentActiveGroup)?.size || 0;
                document.getElementById('statsInfo').innerHTML = `💡 ${currentActiveGroup} | ${litCount}格`;
            } else {
                document.getElementById('statsInfo').innerHTML = `⚫ 熄灭 | 总${total}格`;
            }
        }
        
        // 更新分组侧边栏
        function updateGroupsSidebar() {
            const container = document.getElementById('groupsList');
            if (!currentDrawing || !currentDrawing.groups || currentDrawing.groups.size === 0) {
                container.innerHTML = '<div class="empty-state">无分组数据</div>';
                return;
            }
            const sorted = Array.from(currentDrawing.groups.keys()).sort();
            container.innerHTML = '';
            for (const name of sorted) {
                const count = currentDrawing.groups.get(name).size;
                const div = document.createElement('div');
                div.className = 'group-tag';
                if (currentActiveGroup === name) div.classList.add('active-group');
                div.innerHTML = `<span class="group-name">${name}</span><span class="group-count">${count}</span>`;
                div.addEventListener('click', () => {
                    currentActiveGroup = name;
                    document.querySelectorAll('.group-tag').forEach(el => el.classList.remove('active-group'));
                    div.classList.add('active-group');
                    renderCanvas();
                });
                container.appendChild(div);
            }
        }
        
        function lightAllGroups() {
            if (!currentDrawing) return;
            currentActiveGroup = ALL_GROUPS_MODE;
            document.querySelectorAll('.group-tag').forEach(el => el.classList.remove('active-group'));
            renderCanvas();
        }
        
        function resetAllGroups() {
            if (!currentDrawing) return;
            currentActiveGroup = null;
            document.querySelectorAll('.group-tag').forEach(el => el.classList.remove('active-group'));
            renderCanvas();
        }
        
        // 像素大小控制（步进0.1）
        function initPixelSizeControl() {
            const update = () => {
                currentPixelSize = parseFloat(pixelSizeSlider.value);
                document.getElementById('pixelSizeValue').innerText = `${currentPixelSize.toFixed(1)}px`;
                renderCanvas();
            };
            pixelSizeSlider.addEventListener('input', update);
            document.getElementById('decreaseSizeBtn').addEventListener('click', () => {
                let v = currentPixelSize - 0.1;
                if (v >= 4) { pixelSizeSlider.value = v; update(); }
            });
            document.getElementById('increaseSizeBtn').addEventListener('click', () => {
                let v = currentPixelSize + 0.1;
                if (v <= 32) { pixelSizeSlider.value = v; update(); }
            });
            update();
        }
        
        // 初始化
        async function init() {
            initPixelSizeControl();
            document.getElementById('refreshRepoBtn').addEventListener('click', fetchXmlFileList);
            document.getElementById('lightAllGroupsBtn').addEventListener('click', lightAllGroups);
            document.getElementById('resetGroupsBtn').addEventListener('click', resetAllGroups);
            document.getElementById('downloadDrawingBtn').addEventListener('click', downloadDrawingFromAPI);
            await fetchXmlFileList();
        }
        
        init();
    </script>
</body>
