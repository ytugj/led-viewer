<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LED图纸解析器 · 云端色库版</title>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #000000;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: #e0e0e0;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        .sidebar {
            width: 340px;
            background: #0a0c12;
            border-right: 1px solid #22262f;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .drawing-input-section {
            padding: 18px 16px 12px 16px;
            border-bottom: 1px solid #1e222c;
        }
        .input-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #6c7a9e;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .input-group {
            display: flex;
            gap: 8px;
        }
        .drawing-id-input {
            flex: 1;
            background: #11141e;
            border: 1px solid #2d3348;
            border-radius: 30px;
            padding: 10px 16px;
            color: white;
            font-size: 0.9rem;
            font-family: monospace;
            outline: none;
        }
        .drawing-id-input:focus {
            border-color: #3b82f6;
        }
        .load-drawing-btn {
            background: #1f2a44;
            border: none;
            border-radius: 30px;
            padding: 0 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: 0.2s;
            white-space: nowrap;
        }
        .load-drawing-btn:hover {
            background: #2f3b5a;
        }
        .proxy-toggle {
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: #8d9fc9;
        }
        .proxy-toggle input {
            margin-right: 4px;
        }

        .error-message {
            background: #3a1a1a;
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 8px 12px;
            margin: 8px 16px;
            font-size: 0.75rem;
            color: #ffb3b3;
            display: none;
        }

        .repo-section, .local-section {
            padding: 12px 16px;
            border-bottom: 1px solid #1e222c;
        }
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #6c7a9e;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .refresh-btn {
            background: #1f2a44;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #e0e0e0;
        }
        .xml-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
        .xml-item {
            background: #11141e;
            border: 1px solid #252b3a;
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
        }
        .xml-item:hover {
            background: #1b212f;
            border-color: #3b4b6e;
        }
        .xml-item.active {
            background: #1e2a3e;
            border-left: 3px solid #3b82f6;
            border-color: #3b82f6;
        }
        .add-xml-btn {
            background: #1f2a44;
            border: none;
            border-radius: 30px;
            padding: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            color: white;
            width: 100%;
            transition: 0.2s;
        }

        .groups-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 16px 0 20px 0;
        }
        .groups-header {
            padding: 0 16px 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .color-mode-toggle {
            background: #1a1f2c;
            border-radius: 20px;
            padding: 2px;
            display: inline-flex;
        }
        .mode-btn {
            background: transparent;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #9aa9c7;
            transition: 0.2s;
        }
        .mode-btn.active-mode {
            background: #3b82f6;
            color: white;
        }
        .groups-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 12px 12px 12px;
        }
        .group-card {
            background: #12161f;
            border-radius: 20px;
            padding: 8px 14px 8px 10px;
            border: 1px solid #252c3c;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .group-card:hover {
            background: #1e2538;
            border-color: #3b82f6;
        }
        .group-card.active-group {
            background: #1e3a5f;
            border-color: #3b82f6;
            box-shadow: 0 0 6px rgba(59,130,246,0.3);
        }
        .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid #3f4a60;
            flex-shrink: 0;
        }
        .group-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            font-size: 0.75rem;
        }
        .group-name-line {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: #cfdef5;
        }
        .group-rgb {
            font-family: monospace;
            font-size: 0.65rem;
            color: #8d9fc9;
        }
        .group-count {
            background: #1e2538;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .action-buttons {
            margin: 12px 12px 0 12px;
            display: flex;
            gap: 10px;
            flex-direction: column;
        }
        .action-btn {
            background: #1f2538;
            border: none;
            border-radius: 40px;
            padding: 8px;
            color: #eef3ff;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .action-btn.primary {
            background: #2c3e66;
            border: 1px solid #3b82f6;
        }

        .main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000000;
            overflow: hidden;
        }
        .toolbar {
            background: #080b10e0;
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            border-bottom: 1px solid #1e232e;
        }
        .pixel-size-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0f131c;
            padding: 6px 16px;
            border-radius: 60px;
        }
        .size-control-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .size-btn {
            background: #2a2f41;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .size-btn:hover {
            background: #3b82f6;
        }
        input#pixelSizeSlider {
            width: 160px;
        }
        .pixel-size-value {
            min-width: 100px;
            font-family: monospace;
            font-size: 0.8rem;
            background: #00000066;
            padding: 2px 8px;
            border-radius: 20px;
            text-align: center;
        }
        .current-info {
            font-size: 0.75rem;
            background: #11161f;
            padding: 5px 14px;
            border-radius: 40px;
            font-family: monospace;
        }
        .canvas-container {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
        }
        canvas {
            display: block;
            box-shadow: 0 0 0 1px #2a2f3e;
            background-color: #000000;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        .empty-state {
            color: #6c7a9e;
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0e16;
        }
        ::-webkit-scrollbar-thumb {
            background: #2c334b;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="drawing-input-section">
            <div class="input-label">
                <span>🔢 在线图纸编号 (ohmybead)</span>
            </div>
            <div class="input-group">
                <input type="text" class="drawing-id-input" id="drawingIdInput" placeholder="例如: 358057" value="358057">
                <button class="load-drawing-btn" id="loadDrawingByIdBtn">解析</button>
            </div>
            <div class="proxy-toggle">
                <label>
                    <input type="checkbox" id="useProxyCheckbox"> 使用CORS代理 (解决跨域)
                </label>
            </div>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="repo-section">
            <div class="section-title">
                <span>📁 仓库XML (备用)</span>
                <button class="refresh-btn" id="refreshRepoBtn">🔄 刷新</button>
            </div>
            <div class="xml-list" id="xmlList">
                <div class="empty-state">点击刷新加载XML</div>
            </div>
        </div>
        <div class="local-section">
            <button class="add-xml-btn" id="addLocalXmlBtn">📂 上传本地XML</button>
        </div>

        <div class="groups-section">
            <div class="groups-header">
                <div class="section-title" style="margin-bottom:0;">🎨 颜色分组</div>
                <div class="color-mode-toggle" id="colorModeToggle">
                    <button class="mode-btn active-mode" data-mode="color">🎨 原色</button>
                    <button class="mode-btn" data-mode="white">⬜ 白色</button>
                </div>
            </div>
            <div class="groups-list" id="groupsList">
                <div class="empty-state">输入编号并解析</div>
            </div>
            <div class="action-buttons">
                <button class="action-btn primary" id="lightAllGroupsBtn">✨ 点亮所有分组</button>
                <button class="action-btn" id="resetGroupsBtn">🔘 全部熄灭</button>
            </div>
        </div>
    </div>

    <div class="main-view">
        <div class="toolbar">
            <div class="pixel-size-control">
                <span>🔲 格子大小</span>
                <div class="size-control-wrapper">
                    <button class="size-btn" id="decreaseSizeBtn">-</button>
                    <input type="range" id="pixelSizeSlider" min="4" max="32" step="0.1" value="12">
                    <button class="size-btn" id="increaseSizeBtn">+</button>
                </div>
                <span class="pixel-size-value" id="pixelSizeValue">12.0 x 12.0 px</span>
            </div>
            <div class="current-info" id="statsInfo">📐 未加载图纸</div>
        </div>
        <div class="canvas-container">
            <canvas id="ledCanvas"></canvas>
        </div>
    </div>
</div>

    /**
     * 正确的调色板索引解码方法（与Python版本完全一致）
     * 规则：第2个字节（索引1）-150 作为第一个色号索引
     *       从第3个字节（索引2）开始？不对，Python代码是从索引3开始（第4个字节）
     *       仔细分析Python代码：for i in range(3, len(bytes_list)):
     *       所以起始索引是3（第4个字节），不是2
     */
    function decodePaletteIndicesCorrect(paletteB64) {
        try {
            const binaryString = atob(paletteB64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            
            const bytesList = Array.from(bytes);
            
            if (bytesList.length < 2) {
                throw new Error('调色板数据过短');
            }
            
            // 第2个字节（索引1）减150作为第一个色号索引
            let firstColorIndex = bytesList[1] - 150;
            if (firstColorIndex < 1) firstColorIndex = 1;
            
            const indices = [firstColorIndex];
            
            // 从第4个字节（索引3）开始，后续每个字节值作为差值累加
            // 这与Python代码完全一致：for i in range(3, len(bytes_list)):
            for (let i = 3; i < bytesList.length; i++) {
                const delta = bytesList[i];
                const nextIndex = indices[indices.length - 1] + delta;
                indices.push(nextIndex);
            }
            
            return indices.map(idx => Math.max(1, idx));
        } catch (e) {
            console.error('解码调色板失败:', e);
            throw new Error('调色板解码失败: ' + e.message);
        }
    }

    async function parseOhmybeadDrawing(drawingId, useProxy = false) {
        let url = `https://oss.ohmybead.cn/projects/56411/${drawingId}/drawing.omb`;
        
        if (useProxy) {
            url = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        }
        
        const headers = {
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
            "Accept": "*/*",
        };
        
        try {
            console.log('请求URL:', url);
            const response = await fetch(url, { 
                headers,
                mode: 'cors',
                credentials: 'omit'
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const buffer = await response.arrayBuffer();
            console.log('下载数据大小:', buffer.byteLength);
            
            let decompressed;
            try {
                const ds = new DecompressionStream('gzip');
                const writer = ds.writable.getWriter();
                writer.write(new Uint8Array(buffer));
                writer.close();
                
                const chunks = [];
                const reader = ds.readable.getReader();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                }
                
                const totalLength = chunks.reduce((acc, chunk) => acc + chunk.length, 0);
                decompressed = new Uint8Array(totalLength);
                let offset = 0;
                for (const chunk of chunks) {
                    decompressed.set(chunk, offset);
                    offset += chunk.length;
                }
            } catch (e) {
                console.warn('gzip解压失败，尝试直接解析:', e);
                decompressed = new Uint8Array(buffer);
            }
            
            console.log('解压后大小:', decompressed.length);
            
            const jsonText = new TextDecoder().decode(decompressed);
            const data = JSON.parse(jsonText);
            
            // 优先使用文件中的 customLegend，如果没有则使用内嵌色板
            let fullLegend = data.calibrationProgress?.customLegend;
            if (!fullLegend || !Array.isArray(fullLegend) || fullLegend.length === 0) {
                console.log('图纸无 customLegend，使用内嵌色板');
                fullLegend = EMBEDDED_LEGEND;
            }
            
            console.log(`色板大小: ${fullLegend.length}`);
            
            // 使用正确的解码方法
            const paletteIndices = decodePaletteIndicesCorrect(data.palette);
            console.log(`解码出的调色板索引数量: ${paletteIndices.length}`);
            console.log(`索引范围: ${Math.min(...paletteIndices)} - ${Math.max(...paletteIndices)}`);
            
            // 构建RGBA颜色表（索引0为透明背景）
            const colorTable = [{ r:0, g:0, b:0, a:0, id:'TRANSPARENT' }];
            
            // 从索引1开始对应调色板中的颜色
            for (let i = 0; i < paletteIndices.length; i++) {
                const paletteIdx = paletteIndices[i];
                if (paletteIdx >= 1 && paletteIdx <= fullLegend.length) {
                    const legendIdx = paletteIdx - 1;
                    const c = fullLegend[legendIdx];
                    if (c && c.rgb) {
                        colorTable.push({ 
                            r: c.rgb.r, 
                            g: c.rgb.g, 
                            b: c.rgb.b, 
                            a: 255, 
                            id: c.id || `color_${i}`
                        });
                    } else {
                        colorTable.push({ r:0, g:0, b:0, a:255, id:'INVALID' });
                    }
                } else {
                    console.warn(`调色板索引 ${paletteIdx} 超出色库范围 (1-${fullLegend.length})`);
                    colorTable.push({ r:0, g:0, b:0, a:255, id:'INVALID' });
                }
            }
            
            console.log(`实际使用的颜色数: ${colorTable.length}`);
            
            // 解码像素层
            const pixelLayer = data.layers.find(l => l.type === 'pixel');
            if (!pixelLayer) throw new Error('未找到像素图层');

            const compressedBytes = Uint8Array.from(atob(pixelLayer.data), c => c.charCodeAt(0));
            const intArray = [];
            for (let i = 0; i < compressedBytes.length; i+=4) {
                if (i + 4 <= compressedBytes.length) {
                    const view = new DataView(compressedBytes.buffer.slice(i, i+4));
                    intArray.push(view.getUint32(0, true));
                }
            }

            // 修改部分：优先从 layer.pos 获取尺寸
            let width, height;

            // 方法1: 从 pixel layer 的 pos 字段获取 [x, y, w, h]
            if (pixelLayer.pos && pixelLayer.pos.length >= 4) {
                width = pixelLayer.pos[2];   // 宽度
                height = pixelLayer.pos[3];  // 高度
                console.log(`从 layer.pos 获取尺寸: ${width} x ${height}`);
            } 
            // 方法2: 从 calibrationSettings 获取（兼容旧文件）
            else if (data.calibrationSettings && data.calibrationSettings.cols && data.calibrationSettings.rows) {
                width = data.calibrationSettings.cols;
                height = data.calibrationSettings.rows;
                console.log(`从 calibrationSettings 获取尺寸: ${width} x ${height}`);
            }
            else {
                throw new Error('无法获取图纸尺寸');
            }

            // 验证尺寸有效性
            if (width <= 0 || height <= 0 || !Number.isInteger(width) || !Number.isInteger(height)) {
                throw new Error(`无效的图纸尺寸: ${width}x${height}`);
            }

            const expected = width * height;

            let pixelIndices = [];
            let i = 0;
            while (i < intArray.length && pixelIndices.length < expected) {
                if (i + 1 < intArray.length) {
                    const count = intArray[i];
                    const value = intArray[i+1];
                    i += 2;
                    // 限制添加数量，避免超过预期
                    for (let k = 0; k < count && pixelIndices.length < expected; k++) {
                        pixelIndices.push(value);
                    }
                } else break;
            }
            pixelIndices = pixelIndices.slice(0, expected);

            console.log(`图纸尺寸: ${width} x ${height}`);
            console.log(`总像素数: ${pixelIndices.length}`);
            console.log(`像素索引范围: ${Math.min(...pixelIndices)} - ${Math.max(...pixelIndices)}`);
            
            // 构建分组
            const groupsMap = new Map();
            const pixelGroupsGrid = Array(height).fill().map(() => Array(width).fill().map(() => new Set()));
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = y * width + x;
                    const colorIdx = pixelIndices[idx];
                    if (colorIdx === 0) continue;
                    
                    if (colorIdx < colorTable.length) {
                        const color = colorTable[colorIdx];
                        if (color && color.a !== 0) {
                            const groupId = color.id;
                            if (!groupsMap.has(groupId)) {
                                groupsMap.set(groupId, {
                                    id: groupId,
                                    rgb: { r: color.r, g: color.g, b: color.b },
                                    coords: new Set()
                                });
                            }
                            groupsMap.get(groupId).coords.add(coordKey(x, y));
                            pixelGroupsGrid[y][x].add(groupId);
                        }
                    } else {
                        console.warn(`像素索引 ${colorIdx} 超出颜色表范围 (0-${colorTable.length-1})`);
                    }
                }
            }
            
            console.log(`颜色分组数量: ${groupsMap.size}`);
            
            return {
                id: drawingId,
                width, height,
                colorTable,
                groups: groupsMap,
                pixelGrid: pixelGroupsGrid,
                rawIndices: pixelIndices,
            };
        } catch (error) {
            console.error('解析失败:', error);
            throw error;
        }
    }

    function renderCanvas() {
        if (!currentDrawingData || !ctx) return;
        const { width, height, pixelGrid, groups } = currentDrawingData;
        const pixelSize = currentPixelSize;
        const canvasWidth = width * pixelSize;
        const canvasHeight = height * pixelSize;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        
        for (let row = 0; row < height; row++) {
            for (let col = 0; col < width; col++) {
                const groupsAtPixel = pixelGrid[row][col];
                let shouldLight = false;
                
                if (currentActiveGroup === ALL_GROUPS_MODE) {
                    shouldLight = groupsAtPixel.size > 0;
                } else if (currentActiveGroup) {
                    shouldLight = groupsAtPixel.has(currentActiveGroup);
                }
                
                if (shouldLight) {
                    const x = col * pixelSize;
                    const y = row * pixelSize;
                    
                    if (colorMode === 'white') {
                        ctx.fillStyle = '#FFFFFF';
                    } else {
                        // 原色模式：获取像素的实际颜色
                        if (currentActiveGroup === ALL_GROUPS_MODE && groupsAtPixel.size > 0) {
                            const firstGroupId = groupsAtPixel.values().next().value;
                            const groupInfo = groups.get(firstGroupId);
                            if (groupInfo) {
                                ctx.fillStyle = `rgb(${groupInfo.rgb.r}, ${groupInfo.rgb.g}, ${groupInfo.rgb.b})`;
                            } else {
                                ctx.fillStyle = '#FFFFFF';
                            }
                        } else if (currentActiveGroup && currentActiveGroup !== ALL_GROUPS_MODE) {
                            const groupInfo = groups.get(currentActiveGroup);
                            if (groupInfo) {
                                ctx.fillStyle = `rgb(${groupInfo.rgb.r}, ${groupInfo.rgb.g}, ${groupInfo.rgb.b})`;
                            } else {
                                ctx.fillStyle = '#FFFFFF';
                            }
                        } else {
                            ctx.fillStyle = '#FFFFFF';
                        }
                    }
                    ctx.fillRect(x, y, pixelSize, pixelSize);
                }
            }
        }
        
        drawGridLines(canvasWidth, canvasHeight, pixelSize, width, height);
    }
    
    function drawGridLines(cw, ch, ps, cols, rows) {
        ctx.save();
        ctx.beginPath();
        for (let i = 0; i <= cols; i++) {
            const x = i * ps;
            ctx.moveTo(x, 0);
            ctx.lineTo(x, ch);
        }
        for (let i = 0; i <= rows; i++) {
            const y = i * ps;
            ctx.moveTo(0, y);
            ctx.lineTo(cw, y);
        }
        ctx.lineWidth = 0.5;
        ctx.strokeStyle = '#333333';
        ctx.stroke();
        ctx.restore();
    }
    
    function updateGroupsSidebar() {
        const container = document.getElementById('groupsList');
        if (!currentDrawingData || !currentDrawingData.groups || currentDrawingData.groups.size === 0) {
            container.innerHTML = '<div class="empty-state">无颜色分组</div>';
            return;
        }
        const groups = currentDrawingData.groups;
        const sorted = Array.from(groups.entries()).sort((a,b) => a[0].localeCompare(b[0]));
        
        container.innerHTML = '';
        for (const [groupId, groupInfo] of sorted) {
            const { rgb, coords } = groupInfo;
            const card = document.createElement('div');
            card.className = 'group-card';
            if (currentActiveGroup === groupId) card.classList.add('active-group');
            
            const dot = document.createElement('div');
            dot.className = 'color-dot';
            dot.style.backgroundColor = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'group-info';
            infoDiv.innerHTML = `
                <div class="group-name-line">
                    <span>${groupId}</span>
                    <span class="group-count">${coords.size}</span>
                </div>
                <div class="group-rgb">RGB(${rgb.r}, ${rgb.g}, ${rgb.b})</div>
            `;
            
            card.appendChild(dot);
            card.appendChild(infoDiv);
            card.addEventListener('click', () => {
                currentActiveGroup = groupId;
                document.querySelectorAll('.group-card').forEach(el => el.classList.remove('active-group'));
                card.classList.add('active-group');
                renderCanvas();
            });
            container.appendChild(card);
        }
    }
    
    async function loadDrawingById(drawingId) {
        const stats = document.getElementById('statsInfo');
        const groupsList = document.getElementById('groupsList');
        const useProxy = document.getElementById('useProxyCheckbox').checked;
        
        groupsList.innerHTML = '<div class="empty-state">⏳ 解析图纸中...</div>';
        stats.innerHTML = '⏳ 加载中...';
        
        try {
            const data = await parseOhmybeadDrawing(drawingId, useProxy);
            currentDrawingData = data;
            currentActiveGroup = null;
            updateGroupsSidebar();
            renderCanvas();
            stats.innerHTML = `✅ 图纸 ${drawingId} | ${data.width}x${data.height} | 分组: ${data.groups.size}`;
        } catch (e) {
            console.error('加载失败:', e);
            let errorMsg = e.message;
            if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
                errorMsg = '网络请求失败，请尝试勾选"使用CORS代理"';
            } else if (e.message.includes('JSON')) {
                errorMsg = '数据解析失败，图纸可能已损坏';
            }
            groupsList.innerHTML = `<div class="empty-state">❌ 解析失败<br><small>${errorMsg}</small></div>`;
            stats.innerHTML = '❌ 加载失败';
            showError(errorMsg);
        }
    }
    
    function lightAllGroups() {
        if (!currentDrawingData) return;
        currentActiveGroup = ALL_GROUPS_MODE;
        document.querySelectorAll('.group-card').forEach(el => el.classList.remove('active-group'));
        renderCanvas();
    }
    
    function resetGroups() {
        if (!currentDrawingData) return;
        currentActiveGroup = null;
        document.querySelectorAll('.group-card').forEach(el => el.classList.remove('active-group'));
        renderCanvas();
    }
    
    function initPixelSize() {
        const update = () => {
            currentPixelSize = parseFloat(pixelSizeSlider.value);
            pixelSizeValueSpan.innerText = `${currentPixelSize.toFixed(1)} x ${currentPixelSize.toFixed(1)} px`;
            renderCanvas();
        };
        pixelSizeSlider.addEventListener('input', update);
        document.getElementById('decreaseSizeBtn').addEventListener('click', () => {
            let val = currentPixelSize - 0.5;
            if (val >= 4) { pixelSizeSlider.value = val; update(); }
        });
        document.getElementById('increaseSizeBtn').addEventListener('click', () => {
            let val = currentPixelSize + 0.5;
            if (val <= 32) { pixelSizeSlider.value = val; update(); }
        });
        update();
    }
    
    function initColorMode() {
        const btns = document.querySelectorAll('.mode-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active-mode'));
                btn.classList.add('active-mode');
                colorMode = btn.dataset.mode;
                renderCanvas();
            });
        });
    }
    
    async function fetchXmlFileList() { 
        const xmlListDiv = document.getElementById('xmlList');
        xmlListDiv.innerHTML = '<div class="empty-state">XML功能保留，优先使用在线解析</div>';
    }
    
    function addLocalXml() { 
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json,.omb';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const stats = document.getElementById('statsInfo');
            stats.innerHTML = '⏳ 解析本地文件...';
            
            try {
                const text = await file.text();
                const data = JSON.parse(text);
                
                // 优先使用文件中的 customLegend，如果没有则使用内嵌色板
                let fullLegend = data.calibrationProgress?.customLegend;
                if (!fullLegend || !Array.isArray(fullLegend) || fullLegend.length === 0) {
                    console.log('本地文件无 customLegend，使用内嵌色板');
                    fullLegend = EMBEDDED_LEGEND;
                }
                
                const paletteIndices = decodePaletteIndicesCorrect(data.palette);
                
                const colorTable = [{ r:0,g:0,b:0,a:0, id:'TRANSPARENT' }];
                for (let i = 0; i < paletteIndices.length; i++) {
                    const paletteIdx = paletteIndices[i];
                    if (paletteIdx >= 1 && paletteIdx <= fullLegend.length) {
                        const c = fullLegend[paletteIdx - 1];
                        colorTable.push({ r: c.rgb.r, g: c.rgb.g, b: c.rgb.b, a: 255, id: c.id });
                    } else {
                        colorTable.push({ r:0,g:0,b:0,a:255, id:'INVALID' });
                    }
                }
                
                const pixelLayer = data.layers.find(l => l.type === 'pixel');
                const compressedBytes = Uint8Array.from(atob(pixelLayer.data), c => c.charCodeAt(0));
                const intArray = [];
                for (let i = 0; i < compressedBytes.length; i+=4) {
                    if (i + 4 <= compressedBytes.length) {
                        intArray.push(new DataView(compressedBytes.buffer.slice(i, i+4)).getUint32(0, true));
                    }
                }
                
                // 获取尺寸 - 优先从 layer.pos 获取
                let width, height;
                if (pixelLayer.pos && pixelLayer.pos.length >= 4) {
                    width = pixelLayer.pos[2];
                    height = pixelLayer.pos[3];
                } else if (data.calibrationSettings) {
                    width = data.calibrationSettings.cols;
                    height = data.calibrationSettings.rows;
                } else {
                    throw new Error('无法获取图纸尺寸');
                }
                
                const expected = width * height;
                let pixelIndices = [];
                let i = 0;
                while (i < intArray.length && pixelIndices.length < expected) {
                    if (i+1 < intArray.length) {
                        const count = intArray[i];
                        const value = intArray[i+1];
                        i += 2;
                        for (let k=0; k<count && pixelIndices.length < expected; k++) pixelIndices.push(value);
                    } else break;
                }
                pixelIndices = pixelIndices.slice(0, expected);
                
                const groupsMap = new Map();
                const pixelGroupsGrid = Array(height).fill().map(() => Array(width).fill().map(() => new Set()));
                
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const idx = y * width + x;
                        const colorIdx = pixelIndices[idx];
                        if (colorIdx === 0) continue;
                        if (colorIdx < colorTable.length) {
                            const color = colorTable[colorIdx];
                            if (color && color.a !== 0) {
                                const groupId = color.id;
                                if (!groupsMap.has(groupId)) {
                                    groupsMap.set(groupId, {
                                        id: groupId,
                                        rgb: { r: color.r, g: color.g, b: color.b },
                                        coords: new Set()
                                    });
                                }
                                groupsMap.get(groupId).coords.add(coordKey(x, y));
                                pixelGroupsGrid[y][x].add(groupId);
                            }
                        }
                    }
                }
                
                currentDrawingData = { width, height, colorTable, groups: groupsMap, pixelGrid: pixelGroupsGrid };
                currentActiveGroup = null;
                updateGroupsSidebar();
                renderCanvas();
                stats.innerHTML = `📁 本地: ${file.name} | ${width}x${height} | 分组: ${groupsMap.size}`;
            } catch (e) {
                showError('本地文件解析失败: ' + e.message);
                stats.innerHTML = '❌ 解析失败';
            }
        };
        input.click();
    }
    
    async function init() {
        initPixelSize();
        initColorMode();
        
        document.getElementById('loadDrawingByIdBtn').addEventListener('click', () => {
            const id = document.getElementById('drawingIdInput').value.trim();
            if (id) loadDrawingById(id);
        });
        
        document.getElementById('drawingIdInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const id = e.target.value.trim();
                if (id) loadDrawingById(id);
            }
        });
        
        document.getElementById('lightAllGroupsBtn').addEventListener('click', lightAllGroups);
        document.getElementById('resetGroupsBtn').addEventListener('click', resetGroups);
        document.getElementById('refreshRepoBtn').addEventListener('click', fetchXmlFileList);
        document.getElementById('addLocalXmlBtn').addEventListener('click', addLocalXml);
        
        await loadDrawingById('358057');
    }
    
    init();
</script>
